<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Pipeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .unsupported {
      background-color: rgb(254 240 138 / 0.5);
      text-decoration: line-through wavy rgb(202 138 4);
    }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      margin: 2px;
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .badge:hover { background: #c7d2fe; }
    .citation-text {
      font-size: 0.8rem;
      color: #4b5563;
      padding: 8px;
      background: #f9fafb;
      border-left: 3px solid #6366f1;
      margin-top: 6px;
      border-radius: 4px;
      white-space: pre-wrap;
    }
    details summary { cursor: pointer; color: #6b7280; font-size: 0.75rem; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div class="container mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-4 h-screen">
    <!-- Left: ingestion -->
    <aside class="md:col-span-1 bg-white rounded-lg shadow p-4 flex flex-col overflow-hidden">
      <h2 class="text-lg font-semibold mb-3">Knowledge base</h2>
      <form id="ingest-form" class="space-y-3">
        <input
          type="file" id="files" name="files" multiple accept="application/pdf"
          class="block w-full text-sm border border-gray-300 rounded p-2"
        />
        <button
          type="submit" id="ingest-btn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded"
        >Ingest PDFs</button>
      </form>
      <div id="ingest-status" class="mt-3 text-sm space-y-2 overflow-y-auto"></div>
    </aside>

    <!-- Right: chat -->
    <main class="md:col-span-2 bg-white rounded-lg shadow p-4 flex flex-col overflow-hidden">
      <h2 class="text-lg font-semibold mb-3">Chat</h2>
      <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-3 pr-2"></div>
      <form id="query-form" class="flex gap-2">
        <input
          type="text" id="query" autocomplete="off"
          placeholder="Ask anything about your PDFs..."
          class="flex-1 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <button
          type="submit" id="query-btn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 rounded"
        >Send</button>
      </form>
    </main>
  </div>

  <script>
    const ingestForm = document.getElementById("ingest-form");
    const ingestStatus = document.getElementById("ingest-status");
    const ingestBtn = document.getElementById("ingest-btn");
    const filesInput = document.getElementById("files");
    const queryForm = document.getElementById("query-form");
    const queryInput = document.getElementById("query");
    const queryBtn = document.getElementById("query-btn");
    const messages = document.getElementById("messages");

    function el(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text !== undefined) e.textContent = text;
      return e;
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function highlightUnsupported(answer, unsupported) {
      let html = escapeHtml(answer);
      if (!unsupported || unsupported.length === 0) return html;
      for (const s of unsupported) {
        const escaped = escapeHtml(s);
        html = html.split(escaped).join(
          `<span class="unsupported" title="Not clearly supported by the retrieved context">${escaped}</span>`
        );
      }
      return html;
    }

    function renderUserMsg(text) {
      const wrap = el("div", "flex justify-end");
      const bubble = el(
        "div",
        "bg-indigo-600 text-white px-3 py-2 rounded-lg max-w-[85%] whitespace-pre-wrap",
        text
      );
      wrap.appendChild(bubble);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
    }

    function renderAssistantMsg(resp) {
      const wrap = el("div", "flex justify-start");
      const bubble = el("div", "bg-gray-100 px-3 py-2 rounded-lg max-w-[85%]");

      if (resp.refused) {
        bubble.appendChild(
          el("div", "text-xs font-semibold text-red-700 mb-1", `Refused (${resp.refusal_reason})`)
        );
      } else if (resp.insufficient_evidence) {
        bubble.appendChild(
          el("div", "text-xs font-semibold text-amber-700 mb-1", "Insufficient evidence")
        );
      } else {
        bubble.appendChild(
          el("div", "text-xs font-semibold text-gray-500 mb-1", `intent: ${resp.intent}`)
        );
      }

      const ans = el("div", "whitespace-pre-wrap");
      ans.innerHTML = highlightUnsupported(resp.answer, resp.unsupported_sentences);
      bubble.appendChild(ans);

      if (resp.citations && resp.citations.length > 0) {
        const citWrap = el("div", "mt-3 pt-2 border-t border-gray-200");
        citWrap.appendChild(el("div", "text-xs font-semibold text-gray-600 mb-1", "Sources"));
        resp.citations.forEach(c => {
          const badge = el("span", "badge", `${c.doc_name} p.${c.page} · ${c.score.toFixed(3)}`);
          const txt = el("div", "citation-text hidden", c.text);
          badge.addEventListener("click", () => txt.classList.toggle("hidden"));
          citWrap.appendChild(badge);
          citWrap.appendChild(txt);
        });
        bubble.appendChild(citWrap);
      }

      if (resp.rewritten_query) {
        const det = el("details", "mt-2");
        det.appendChild(el("summary", "", "Why these results?"));
        det.appendChild(
          el("div", "text-xs text-gray-600 mt-1", `Rewritten query: "${resp.rewritten_query}"`)
        );
        bubble.appendChild(det);
      }

      wrap.appendChild(bubble);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
    }

    function renderError(msg) {
      const wrap = el("div", "flex justify-start");
      const bubble = el(
        "div", "bg-red-100 text-red-800 px-3 py-2 rounded-lg max-w-[85%]", msg
      );
      wrap.appendChild(bubble);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
    }

    ingestForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!filesInput.files.length) return;

      ingestBtn.disabled = true;
      ingestBtn.textContent = "Ingesting...";
      ingestStatus.innerHTML = "";

      const fd = new FormData();
      for (const f of filesInput.files) fd.append("files", f);

      try {
        const r = await fetch("/ingest", { method: "POST", body: fd });
        const data = await r.json();
        if (!r.ok) {
          ingestStatus.appendChild(el("div", "text-red-700", data.detail || "Ingestion failed"));
        } else {
          data.results.forEach(rep => {
            const line = el("div", "p-2 bg-emerald-50 rounded border border-emerald-200");
            const name = el("div", "font-medium", rep.file);
            const meta = el(
              "div",
              "text-xs text-gray-600",
              `${rep.pages} pages · ${rep.chunks_new} new · ${rep.chunks_reinforced} reinforced`
            );
            line.append(name, meta);
            ingestStatus.appendChild(line);
          });
        }
        filesInput.value = "";
      } catch (err) {
        ingestStatus.appendChild(el("div", "text-red-700", String(err)));
      } finally {
        ingestBtn.disabled = false;
        ingestBtn.textContent = "Ingest PDFs";
      }
    });

    queryForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const q = queryInput.value.trim();
      if (!q) return;
      renderUserMsg(q);
      queryInput.value = "";
      queryBtn.disabled = true;
      queryBtn.textContent = "...";

      try {
        const r = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: q })
        });
        const data = await r.json();
        if (!r.ok) {
          renderError(data.detail || "Query failed");
        } else {
          renderAssistantMsg(data);
        }
      } catch (err) {
        renderError(String(err));
      } finally {
        queryBtn.disabled = false;
        queryBtn.textContent = "Send";
      }
    });
  </script>
</body>
</html>
